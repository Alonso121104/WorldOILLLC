<!DOCTYPE html>
<html>
<head>
  <title>World Oil Provider Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .ticket {
      background: white;
      max-width: 600px;
      margin: 15px auto;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }

    .ticket h2 {
      margin-top: 0;
    }

    .status {
      font-weight: bold;
      text-transform: uppercase;
    }

    button {
      padding: 10px 14px;
      margin: 6px 4px 0 0;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    .accept { background: #28a745; }
    .complete { background: #111; }
    .cancel { background: #dc3545; }
    .refresh { background: #007bff; display: block; margin: 0 auto 20px; }
  </style>
</head>

<body>

<h1>World Oil Provider Dashboard</h1>

<button class="refresh" onclick="loadTickets()">Refresh Tickets</button>

<div id="tickets">Loading tickets...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCInoQ5IkCJwKcxCfhylLJOd1wHVQiefUE",
  authDomain: "worldoilllc.firebaseapp.com",
  projectId: "worldoilllc",
  storageBucket: "worldoilllc.appspot.com",
  messagingSenderId: "769325331754",
  appId: "1:769325331754:web:234d7c3ffa9a6424779a53"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ticketsDiv = document.getElementById("tickets");

async function loadTickets() {
  ticketsDiv.innerHTML = "Loading tickets...";

  try {
    const q = query(collection(db, "oilChanges"), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);

    ticketsDiv.innerHTML = "";

    if (snapshot.empty) {
      ticketsDiv.innerHTML = "<p style='text-align:center;'>No tickets found.</p>";
      return;
    }

    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const id = docSnap.id;

      const ticket = document.createElement("div");
      ticket.className = "ticket";

      ticket.innerHTML = `
        <h2>Ticket: ${data.ticketNumber || id}</h2>
        <p><strong>Status:</strong> <span class="status">${data.status || "pending"}</span></p>
        <p><strong>Customer:</strong> ${data.name || "Not provided"}</p>
        <p><strong>Phone:</strong> ${data.phone || "Not provided"}</p>
        <p><strong>Vehicle:</strong> ${data.year || ""} ${data.make || ""} ${data.model || ""}</p>
        <p><strong>Date:</strong> ${data.rawDate || data.date || "Not provided"}</p>
        <p><strong>Time:</strong> ${data.time || "Not provided"}</p>

        <button class="accept" onclick="updateStatus('${id}', 'accepted')">Accept</button>
        <button class="complete" onclick="updateStatus('${id}', 'completed')">Complete</button>
        <button class="cancel" onclick="updateStatus('${id}', 'cancelled')">Cancel</button>
      `;

      ticketsDiv.appendChild(ticket);
    });

  } catch (error) {
    console.error(error);
    ticketsDiv.innerHTML = "<p style='text-align:center;color:red;'>Error loading tickets.</p>";
  }
}

window.updateStatus = async function(id, status) {
  try {
    await updateDoc(doc(db, "oilChanges", id), {
      status: status,
      updatedAt: new Date().toISOString()
    });

    alert("Ticket updated to " + status);
    loadTickets();

  } catch (error) {
    console.error(error);
    alert("Could not update ticket.");
  }
};

loadTickets();
</script>

</body>
</html>
