<!DOCTYPE html>
<html>
<head>
    <title>World Oil Change</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: url("https://bockauto.com/wp-content/uploads/2022/09/bock-auto-oil-change-icon.jpg") center center no-repeat;
            background-size: 900px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 340px;
            text-align: center;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #111;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #333;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>World Oil Change</h1>

    <form id="bookingForm">

        <input type="text" id="name" placeholder="Full Name" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>

        <input 
            type="number"
            id="year"
            placeholder="Vehicle Year"
            inputmode="numeric"
            pattern="[0-9]*"
            required
        >

        <input type="text" id="make" placeholder="Vehicle Make" required>
        <input type="text" id="model" placeholder="Vehicle Model" required>

        <input type="date" id="date" required>

        <select id="time" required>
            <option value="">Select Time</option>
            <option>08:00 AM</option>
            <option>08:30 AM</option>
            <option>09:00 AM</option>
            <option>09:30 AM</option>
            <option>10:00 AM</option>
            <option>10:30 AM</option>
            <option>11:00 AM</option>
            <option>11:30 AM</option>
            <option>12:00 PM</option>
            <option>12:30 PM</option>
            <option>01:00 PM</option>
            <option>01:30 PM</option>
            <option>02:00 PM</option>
            <option>02:30 PM</option>
            <option>03:00 PM</option>
            <option>03:30 PM</option>
            <option>04:00 PM</option>
            <option>04:30 PM</option>
            <option>05:00 PM</option>
        </select>

        <button type="submit">Submit Request</button>

    </form>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCInoQ5IkCJwKcxCfhylLJOd1wHVQiefUE",
    authDomain: "worldoilllc.firebaseapp.com",
    projectId: "worldoilllc",
    storageBucket: "worldoilllc.appspot.com",
    messagingSenderId: "769325331754",
    appId: "1:769325331754:web:234d7c3ffa9a6424779a53"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("bookingForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    // 📅 FORMAT DATE
    const rawDate = document.getElementById("date").value;

    const dateObj = new Date(rawDate);

    const formattedDate = dateObj.toLocaleDateString("en-US", {
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric"
    });

    // 📦 DATA SENT TO FIREBASE
    const data = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        year: document.getElementById("year").value,
        make: document.getElementById("make").value,
        model: document.getElementById("model").value,
        date: formattedDate,
        time: document.getElementById("time").value,
        status: "pending",
        createdAt: new Date().toISOString()
    };

    try {
        await addDoc(collection(db, "oilChanges"), data);

        alert("Request submitted successfully!");

        document.getElementById("bookingForm").reset();

    } catch (err) {
        console.error(err);
        alert("Error submitting request");
    }
});
</script>

</body>
</html>
