<!DOCTYPE html>
<html>
<head>
  <title>World Oil Technician Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:20px; }
    h1 { text-align:center; }
    .card, .ticket { background:white; max-width:650px; margin:15px auto; padding:18px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.15); }
    input { width:100%; padding:12px; margin:8px 0; font-size:16px; box-sizing:border-box; }
    button { padding:10px 14px; margin:5px; border:none; border-radius:6px; color:white; cursor:pointer; font-size:15px; }
    .login { background:#111; width:100%; }
    .logout, .cancel { background:#dc3545; }
    .refresh { background:#007bff; }
    .accept { background:#28a745; }
    .complete { background:#111; }
    .status { font-weight:bold; text-transform:uppercase; }
    .top-bar { max-width:650px; margin:0 auto 20px; text-align:center; }
    .error { color:red; text-align:center; font-weight:bold; }
    .empty { text-align:center; font-weight:bold; }
  </style>
</head>

<body>

<h1>World Oil Technician Dashboard</h1>

<div id="loginBox" class="card">
  <h2>Technician Login</h2>
  <p>Enter your technician password.</p>
  <input type="password" id="password" placeholder="Password" />
  <button class="login" onclick="login()">Login</button>
  <p id="loginMessage" class="error"></p>
</div>

<div id="dashboard" style="display:none;">
  <div class="top-bar">
    <p>Logged in as: <strong id="userEmail"></strong></p>
    <button class="refresh" onclick="loadTickets()">Refresh Tickets</button>
    <button class="logout" onclick="logout()">Logout</button>
    <p>Showing pending and accepted jobs only.</p>
  </div>

  <div id="tickets">Loading tickets...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCInoQ5IkCJwKcxCfhylLJOd1wHVQiefUE",
  authDomain: "worldoilllc.firebaseapp.com",
  projectId: "worldoilllc",
  storageBucket: "worldoilllc.appspot.com",
  messagingSenderId: "769325331754",
  appId: "1:769325331754:web:234d7c3ffa9a6424779a53"
};

const TECHNICIAN_EMAIL = "technician1@worldoil.com";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginBox = document.getElementById("loginBox");
const dashboard = document.getElementById("dashboard");
const ticketsDiv = document.getElementById("tickets");
const userEmail = document.getElementById("userEmail");

window.login = async function () {
  const password = document.getElementById("password").value;
  const loginMessage = document.getElementById("loginMessage");

  try {
    loginMessage.textContent = "";
    await signInWithEmailAndPassword(auth, TECHNICIAN_EMAIL, password);
  } catch (error) {
    loginMessage.textContent = "Incorrect password.";
  }
};

window.logout = async function () {
  await signOut(auth);
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBox.style.display = "none";
    dashboard.style.display = "block";
    userEmail.textContent = user.email;
    loadTickets();
  } else {
    loginBox.style.display = "block";
    dashboard.style.display = "none";
  }
});

window.loadTickets = async function () {
  ticketsDiv.innerHTML = "Loading tickets...";

  try {
    const snapshot = await getDocs(collection(db, "oilChanges"));
    ticketsDiv.innerHTML = "";

    let tickets = [];

    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const status = data.status || "pending";

      if (status === "pending" || status === "accepted") {
        tickets.push({ id: docSnap.id, ...data });
      }
    });

    tickets.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

    if (tickets.length === 0) {
      ticketsDiv.innerHTML = "<p class='empty'>No active tickets.</p>";
      return;
    }

    tickets.forEach((data) => {
      const vehicle = `${data.year || ""} ${data.make || ""} ${data.model || ""}`.trim();

      const ticket = document.createElement("div");
      ticket.className = "ticket";

      ticket.innerHTML = `
        <h2>Ticket: ${data.ticketNumber || data.id}</h2>
        <p><strong>Status:</strong> <span class="status">${data.status || "pending"}</span></p>
        <p><strong>Customer:</strong> ${data.name || "Not provided"}</p>
        <p><strong>Phone:</strong> ${data.phone || "Not provided"}</p>
        <p><strong>Vehicle:</strong> ${vehicle || "Not provided"}</p>
        <p><strong>Date:</strong> ${data.rawDate || data.date || "Not provided"}</p>
        <p><strong>Time:</strong> ${data.time || "Not provided"}</p>

        <button class="accept" onclick="updateStatus('${data.id}', 'accepted')">Accept</button>
        <button class="complete" onclick="updateStatus('${data.id}', 'completed')">Complete</button>
        <button class="cancel" onclick="updateStatus('${data.id}', 'cancelled')">Cancel</button>
      `;

      ticketsDiv.appendChild(ticket);
    });

  } catch (error) {
    console.error(error);
    ticketsDiv.innerHTML = "<p class='error'>Error loading tickets.</p>";
  }
};

window.updateStatus = async function (id, status) {
  if (!confirm("Change this ticket to " + status + "?")) return;

  try {
    const user = auth.currentUser;

    const updateData = {
      status,
      updatedAt: new Date().toISOString(),
      technicianEmail: user ? user.email : "unknown"
    };

    if (status === "accepted") updateData.technicianAcceptedAt = new Date().toISOString();
    if (status === "completed") updateData.completedAt = new Date().toISOString();
    if (status === "cancelled") updateData.cancelledAt = new Date().toISOString();

    await updateDoc(doc(db, "oilChanges", id), updateData);
    loadTickets();

  } catch (error) {
    console.error(error);
    alert("Could not update ticket.");
  }
};

loadTickets();
</script>

</body>
</html>
