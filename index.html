<!DOCTYPE html>
<html>
<head>
    <title>Oil Change Booking</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: url("https://cdn2.vectorstock.com/i/1000x1000/23/11/line-icon-of-a-car-and-oil-change-symbol-vector-40522311.jpg") center center no-repeat;
            background-size: 900px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 340px;
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .date-box {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            text-align: left;
        }

        .date-box:hover {
            background: #f0f0f0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #111;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #333;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>World Oil Change</h1>

    <form id="bookingForm">

        <input type="text" id="name" placeholder="Full Name" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <input type="number" id="year" placeholder="Vehicle Year" required>
        <input type="text" id="make" placeholder="Vehicle Make" required>
        <input type="text" id="model" placeholder="Vehicle Model" required>

        <!-- DATE -->
        <div class="date-box" onclick="document.getElementById('date').showPicker()">
            <span id="dateText">Select Date</span>
        </div>

        <input type="date" id="date" required style="opacity:0; position:absolute;">

        <!-- TIME -->
        <select id="time" required>
            <option value="">Select Time</option>
            <option>08:00 AM</option>
            <option>08:30 AM</option>
            <option>09:00 AM</option>
            <option>09:30 AM</option>
            <option>10:00 AM</option>
            <option>10:30 AM</option>
            <option>11:00 AM</option>
            <option>11:30 AM</option>
            <option>12:00 PM</option>
            <option>12:30 PM</option>
            <option>01:00 PM</option>
            <option>01:30 PM</option>
            <option>02:00 PM</option>
            <option>02:30 PM</option>
            <option>03:00 PM</option>
            <option>03:30 PM</option>
            <option>04:00 PM</option>
            <option>04:30 PM</option>
            <option>05:00 PM</option>
        </select>

        <button type="submit">Submit Request</button>

    </form>

</div>

<script>
document.getElementById("date").addEventListener("change", function () {
    const formatted = new Date(this.value).toDateString();
    document.getElementById("dateText").innerText = formatted;
});
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCInoQ5IkCJwKcxCfhylLJOd1wHVQiefUE",
    authDomain: "worldoilllc.firebaseapp.com",
    projectId: "worldoilllc",
    storageBucket: "worldoilllc.appspot.com",
    messagingSenderId: "769325331754",
    appId: "1:769325331754:web:234d7c3ffa9a6424779a53"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("bookingForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        year: document.getElementById("year").value,
        make: document.getElementById("make").value,
        model: document.getElementById("model").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        status: "pending",
        createdAt: new Date().toISOString()
    };

    try {
        await addDoc(collection(db, "oilChanges"), data);

        alert("Request submitted successfully!");
        document.getElementById("bookingForm").reset();
        document.getElementById("dateText").innerText = "Select Date";

    } catch (err) {
        console.error(err);
        alert("Error submitting request");
    }
});
</script>

</body>
</html>
